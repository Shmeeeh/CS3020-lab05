<!DOCTYPE html>

<html lang="en">
    <head>
        <title>hey</title>
        <link rel="stylesheet" href="index.css">
        <script src="index.js" type="text/javascript"></script>
    </head>
    <body>
        <div id="container" class="task1">
            <p id="subject">This text will change</p>
            <form>
                <label for="changer">Change text to:</label>
                <input type="text" id="changer" name="changer">
                <button type="button" id="submit" name="changer">Replace</button>
            </form>
        </div>
        <div id="container" class="task1">
            <form>
                <button type="button" id="enlarge" name="sizers">Font Size ++</button>
                <button type="button" id="shrink" name="sizers">Font Size --</button>
            </form>
        </div>
        <hr>
        <div id="container" class="task2">
            <ul>
                <li>
                <label for="colors">Black Text</label>
                <input type="radio" id="blackT" name="colors">
                </li>
                <li>
                <label for="colors">White Text</label>
                <input type="radio" id="whiteT" name="colors">
                </li>
                <li>
                <label for="colors">Orange Text</label>
                <input type="radio" id="orange" name="colors">
                </li>
                <li>
                <label for="colors">Blue Text</label>
                <input type="radio" id="blue" name="colors" checked>
                </li>
            </ul>
            <ul>
                <li>
                <label for="bg">White Background</label>
                <input type="radio" id="white" name="bg" checked>
                </li>
                <li>
                <label for="bg">Black Background</label>
                <input type="radio" id="black" name="bg">
                </li>
                <li>
                <label for="bg">Brown Background</label>
                <input type="radio" id="brown" name="bg">
                </li>
            </ul>
        </div>
        <hr>
        <div class="albumDiv">
            <img id="albumIcon" width="65px" height="65px">
            <p id="albumName" style="text-align:center;">Hover over an album cover to display its name!</p>
    </div>
        <div id="container" class="task3">
            <!-- place 3 images here. figure out what to make them soon. maybe album covers :) -->
             <img id="scholars" src="thescholars.jpg" width="25%" height="25%">
             <img id="flood" src="flood.jpg" width="25%" height="25%">
             <img id="wbtg" src="wbtg.jpg" width="25%" height="25%">
        </div>
    </body>
</html>
